<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstech — Technik & KI für lokale Unternehmen am Bodensee</title>
<meta name="description" content="Konstech hilft Unternehmen rund um den Bodensee, mit moderner Technik und KI effizienter zu arbeiten.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
  :root {
    --bg: #fafbfc;
    --surface: #fff;
    --nav-bg: rgba(255,255,255,0.92);
    --text: #1a1a2e;
    --text2: #4a4a6a;
    --text3: #8a8aa0;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent-dark: #1d4ed8;
    --border: #e5e7eb;
    --radius: 12px;
    --max-w: 960px;
  }

  [data-theme="dark"] {
    --bg: #0f1119;
    --surface: #1a1d2e;
    --nav-bg: rgba(15,17,25,0.92);
    --text: #e8e8f0;
    --text2: #a0a0b8;
    --text3: #606078;
    --accent: #4f8fff;
    --accent-light: #1a2d4a;
    --accent-dark: #3b7aed;
    --border: #2a2d3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; transition: background 0.3s, color 0.3s; }

  /* Nav */
  nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .nav-links { display: flex; gap: 20px; align-items: center; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }
  .nav-cta { background: var(--accent); color: #fff !important; padding: 8px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; transition: background 0.2s; }
  .nav-cta:hover { background: var(--accent-dark); }
  .toggle-btn { background: none; border: 1px solid var(--border); color: var(--text2); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
  .toggle-btn:hover { border-color: var(--accent); }

  /* Hero */
  .hero { max-width: var(--max-w); margin: 0 auto; padding: 80px 24px 60px; text-align: center; }
  .hero h1 { font-size: 42px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 19px; color: var(--text2); max-width: 600px; margin: 0 auto 32px; }
  .hero-cta { display: inline-block; background: var(--accent); color: #fff; padding: 14px 36px; border-radius: 10px; font-size: 16px; font-weight: 700; text-decoration: none; transition: transform 0.2s, background 0.2s; }
  .hero-cta:hover { background: var(--accent-dark); transform: translateY(-2px); }
  .hero-sub { margin-top: 14px; font-size: 14px; color: var(--text3); }

  /* Sections */
  section { max-width: var(--max-w); margin: 0 auto; padding: 60px 24px; }
  section h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
  section .subtitle { color: var(--text2); font-size: 17px; margin-bottom: 36px; }
  .section-divider { max-width: var(--max-w); margin: 0 auto; border: none; border-top: 1px solid var(--border); }

  /* Services grid */
  .services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .service-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; transition: border-color 0.2s, box-shadow 0.2s; }
  .service-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(79,143,255,0.08); }
  .service-card .icon { font-size: 28px; margin-bottom: 12px; }
  .service-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .service-card p { font-size: 14px; color: var(--text2); line-height: 1.6; }

  /* Steps */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; counter-reset: step; }
  .step { position: relative; padding: 24px; }
  .step::before { counter-increment: step; content: counter(step); position: absolute; top: 0; left: 0; font-size: 48px; font-weight: 800; color: var(--accent-light); line-height: 1; }
  [data-theme="dark"] .step::before { color: var(--accent-light); }
  .step h3 { font-size: 16px; font-weight: 700; margin: 12px 0 6px; padding-top: 24px; }
  .step p { font-size: 14px; color: var(--text2); }

  /* Results */
  .results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; text-align: center; }
  .result-item .number { font-size: 36px; font-weight: 800; color: var(--accent); }
  .result-item .label { font-size: 14px; color: var(--text2); margin-top: 4px; }

  /* Contact form */
  .contact-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 600px; margin: 0 auto; }
  .contact-section h2 { text-align: center; }
  .contact-section .subtitle { text-align: center; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text2); }
  .form-row input, .form-row textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { resize: vertical; min-height: 100px; }
  .form-submit { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .form-submit:hover { background: var(--accent-dark); }
  .form-note { text-align: center; margin-top: 12px; font-size: 13px; color: var(--text3); }
  .ohnohoney { position: absolute; left: -9999px; }

  /* Footer */
  footer { text-align: center; padding: 32px 24px; font-size: 13px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 40px; }
  footer a { color: var(--accent); text-decoration: none; }

  /* Responsive */
  @media (max-width: 768px) {
    .hero h1 { font-size: 30px; }
    .hero p { font-size: 17px; }
    .services, .steps, .results { grid-template-columns: 1fr; }
    .nav-links a:not(.nav-cta) { display: none; }
    .contact-section { padding: 28px 20px; }
    nav { padding: 12px 16px; }
    .nav-right { gap: 10px; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="#" class="logo">Kons<span>tech</span></a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="#services" id="navServices">Leistungen</a>
      <a href="#how" id="navHow">Ablauf</a>
      <a href="#contact" class="nav-cta" id="navCta">Kostenlose Beratung</a>
    </div>
    <button class="toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button class="toggle-btn" id="langToggle" onclick="toggleLang()" title="Switch language">EN</button>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <h1><span id="heroH1a">Ihr Unternehmen.</span><br><span id="heroH1b" style="color:var(--accent)">Schneller. Smarter.</span></h1>
  <p id="heroP"></p>
  <a href="#contact" class="hero-cta" id="heroCta">Jetzt kostenlos beraten lassen</a>
  <div class="hero-sub" id="heroSub"></div>
</div>

<hr class="section-divider">

<!-- Services -->
<section id="services">
  <h2 id="servicesTitle"></h2>
  <p class="subtitle" id="servicesSubtitle"></p>
  <div class="services" id="servicesGrid"></div>
</section>

<hr class="section-divider">

<!-- How -->
<section id="how">
  <h2 id="howTitle"></h2>
  <p class="subtitle" id="howSubtitle"></p>
  <div class="steps" id="stepsGrid"></div>
</section>

<hr class="section-divider">

<!-- Results -->
<section id="results">
  <h2 id="resultsTitle"></h2>
  <p class="subtitle" id="resultsSubtitle"></p>
  <div class="results" id="resultsGrid"></div>
</section>

<hr class="section-divider">

<!-- Contact -->
<section id="contact">
  <div class="contact-section">
    <h2 id="contactTitle"></h2>
    <p class="subtitle" id="contactSubtitle"></p>
    <form action="https://formspree.io/f/xzdqknvv" method="POST" id="contactForm">
      <div class="ohnohoney">
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
      </div>
      <input type="hidden" name="_next" value="https://konstech.xyz/#thankyou">
      <input type="hidden" name="_subject" value="Neue Anfrage via konstech.xyz">
      <div class="form-row">
        <label for="name" id="labelName">Name</label>
        <input type="text" id="inputName" name="name" required maxlength="100">
      </div>
      <div class="form-row">
        <label for="email" id="labelEmail">E-Mail</label>
        <input type="email" id="inputEmail" name="email" required maxlength="200">
      </div>
      <div class="form-row">
        <label for="message" id="labelMessage">Was können wir für Sie tun?</label>
        <textarea id="inputMessage" name="message" required maxlength="2000"></textarea>
      </div>
      <button type="submit" class="form-submit" id="formSubmit">Nachricht senden</button>
      <p class="form-note" id="formNote"></p>
    </form>
    <div id="thankyou" style="display:none;text-align:center;padding:40px 0">
      <p style="font-size:20px;font-weight:700;color:var(--accent)" id="tyTitle"></p>
      <p style="color:var(--text2);margin-top:8px" id="tySub"></p>
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <p><span id="footerText"></span></p>
</footer>

<script>
const LOCALES = {};
let currentLang = 'de';
let rateLimitMsg = '';

async function loadLocale(lang) {
  if (!LOCALES[lang]) {
    const res = await fetch(new URL(`locales/${lang}.json`, location.href));
    LOCALES[lang] = await res.json();
  }
  return LOCALES[lang];
}

function applyLocale(d) {
  document.title = d.meta.title;
  document.documentElement.lang = d.meta.lang;

  // Nav
  document.getElementById('navServices').textContent = d.nav.services;
  document.getElementById('navHow').textContent = d.nav.how;
  document.getElementById('navCta').textContent = d.nav.cta;
  document.getElementById('langToggle').textContent = d.nav.switchLang;

  // Hero
  document.getElementById('heroH1a').textContent = d.hero.h1a;
  document.getElementById('heroH1b').textContent = d.hero.h1b;
  document.getElementById('heroP').textContent = d.hero.p;
  document.getElementById('heroCta').textContent = d.hero.cta;
  document.getElementById('heroSub').textContent = d.hero.sub;

  // Services
  document.getElementById('servicesTitle').textContent = d.services.title;
  document.getElementById('servicesSubtitle').textContent = d.services.subtitle;
  document.getElementById('servicesGrid').innerHTML = d.services.items.map(s => `
    <div class="service-card">
      <div class="icon">${s.icon}</div>
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
    </div>`).join('');

  // How
  document.getElementById('howTitle').textContent = d.how.title;
  document.getElementById('howSubtitle').textContent = d.how.subtitle;
  document.getElementById('stepsGrid').innerHTML = d.how.steps.map(s => `
    <div class="step">
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
    </div>`).join('');

  // Results
  document.getElementById('resultsTitle').textContent = d.results.title;
  document.getElementById('resultsSubtitle').textContent = d.results.subtitle;
  document.getElementById('resultsGrid').innerHTML = d.results.items.map(r => `
    <div class="result-item">
      <div class="number">${r.number}</div>
      <div class="label">${r.label}</div>
    </div>`).join('');

  // Contact
  document.getElementById('contactTitle').textContent = d.contact.title;
  document.getElementById('contactSubtitle').textContent = d.contact.subtitle;
  document.getElementById('labelName').textContent = d.contact.name;
  document.getElementById('inputName').placeholder = d.contact.namePlaceholder;
  document.getElementById('labelEmail').textContent = d.contact.email;
  document.getElementById('inputEmail').placeholder = d.contact.emailPlaceholder;
  document.getElementById('labelMessage').textContent = d.contact.message;
  document.getElementById('inputMessage').placeholder = d.contact.messagePlaceholder;
  document.getElementById('formSubmit').textContent = d.contact.submit;
  document.getElementById('formNote').textContent = d.contact.note;
  document.getElementById('tyTitle').textContent = d.contact.thankYou;
  document.getElementById('tySub').textContent = d.contact.thankYouSub;
  rateLimitMsg = d.contact.rateLimitMsg;

  // Footer
  document.getElementById('footerText').textContent = d.footer;
}

async function setLang(lang) {
  currentLang = lang;
  const data = await loadLocale(lang);
  applyLocale(data);
  localStorage.setItem('konstech_lang', lang);
}

function toggleLang() {
  setLang(currentLang === 'de' ? 'en' : 'de');
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('konstech_theme', next);
}

// Init
(async () => {
  // Restore theme (default: dark)
  const savedTheme = localStorage.getItem('konstech_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

  // Restore language (default: de)
  const savedLang = localStorage.getItem('konstech_lang') || 'de';
  await setLang(savedLang);

  // Thank you redirect
  if (location.hash === '#thankyou') {
    const form = document.getElementById('contactForm');
    const ty = document.getElementById('thankyou');
    if (form && ty) { form.style.display = 'none'; ty.style.display = 'block'; }
  }

  // Rate limiting
  const form = document.getElementById('contactForm');
  if (form) {
    form.addEventListener('submit', function(e) {
      const last = localStorage.getItem('konstech_last_submit');
      const now = Date.now();
      if (last && (now - parseInt(last)) < 60000) {
        e.preventDefault();
        alert(rateLimitMsg);
        return;
      }
      localStorage.setItem('konstech_last_submit', now.toString());
    });
  }
})();
</script>
</body>
</html>
